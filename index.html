<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MRA Directory Compact</title>
    <style>
        :root { --dark: #3c4043; --blue: #1a73e8; --gray: #70757a; --border: #dadce0; --light-bg: #f8f9fa; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 0; background: #fff; color: var(--dark); -webkit-tap-highlight-color: transparent; }
        
        header { background: var(--dark); color: white; padding: 10px; text-align: center; position: sticky; top: 0; z-index: 1000; }
        header h1 { margin: 0; font-size: 1rem; font-weight: 500; }

        .search-container { padding: 6px 10px; background: #fff; border-bottom: 1px solid var(--border); position: sticky; top: 37px; z-index: 999; }
        #searchInput { width: 100%; padding: 8px 15px; border-radius: 20px; border: 1px solid var(--border); font-size: 14px; outline: none; box-sizing: border-box; }

        .location-section { border-bottom: 1px solid var(--border); }
        .location-header { background: var(--light-bg); padding: 8px 12px; cursor: pointer; display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: 600; align-items: center; }
        
        .location-content { display: none; }
        
        /* One-Line Row Design */
        .contact-row { 
            display: flex; 
            align-items: center; 
            padding: 6px 12px; 
            border-bottom: 1px solid #f1f3f4; 
            gap: 8px;
        }

        .contact-info { 
            flex: 1; 
            display: flex; 
            align-items: baseline; 
            overflow: hidden; 
            white-space: nowrap; 
            gap: 6px;
        }

        .dept-label { 
            font-size: 0.65rem; 
            color: var(--blue); 
            font-weight: 800; 
            flex-shrink: 0;
            width: 55px; /* Fixed width keeps names aligned */
            text-overflow: ellipsis;
            overflow: hidden;
        }

        .contact-name { 
            font-size: 0.9rem; 
            font-weight: 500; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }

        .contact-title { 
            font-size: 0.75rem; 
            color: var(--gray); 
            overflow: hidden; 
            text-overflow: ellipsis;
        }

        /* Compact Call Button */
        .call-btn { 
            color: var(--blue); 
            text-decoration: none; 
            font-size: 0.8rem; 
            font-weight: 700; 
            padding: 4px 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
            white-space: nowrap;
        }

        .call-icon {
            background: var(--blue);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            text-decoration: none;
            flex-shrink: 0;
        }

        .chevron::after { content: '▼'; font-size: 0.5rem; color: var(--gray); }
        .active .chevron::after { content: '▲'; }
        #loading { text-align: center; padding: 20px; color: var(--gray); font-size: 0.85rem; }
    </style>
</head>
<body>

<header><h1>MRA Directory</h1></header>
<div class="search-container"><input type="text" id="searchInput" placeholder="Search..." onkeyup="filterList()"></div>
<div id="directory"><div id="loading">Loading...</div></div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRR4JXxJLCTe_P6-il5qzS-oKP8gU_1jYkCHGHH0tYVoejVgMXl3CGifcgC603ZiVLOAl53zL_u9P83/pub?output=csv';

    async function init() {
        try {
            const resp = await fetch(csvUrl);
            const text = await resp.text();
            const rows = text.split(/\r?\n/).slice(1); 
            const grouped = {};
            
            rows.forEach(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length < 5 || cols[0].includes('{')) return; 
                const [loc, dept, name, title, phone] = cols.map(c => c.replace(/^"|"$/g, '').trim());
                if (!loc || !name) return; 
                if (!grouped[loc]) grouped[loc] = [];
                grouped[loc].push({ dept, name, title, phone });
            });
            render(grouped);
        } catch (e) { document.getElementById('loading').innerHTML = "Check CSV Link"; }
    }

    function render(data) {
        const container = document.getElementById('directory');
        container.innerHTML = '';
        
        Object.keys(data).sort().forEach(loc => {
            const section = document.createElement('div');
            section.className = 'location-section';
            
            const header = document.createElement('div');
            header.className = 'location-header';
            header.innerHTML = `<span>${loc}</span><span class="chevron"></span>`;
            header.onclick = () => toggle(header);

            const content = document.createElement('div');
            content.className = 'location-content';

            data[loc].sort((a,b) => a.dept.localeCompare(b.dept)).forEach(c => {
                const dial = c.phone.replace(/\D/g, '');
                content.innerHTML += `
                    <div class="contact-row" data-search="${c.name} ${c.dept} ${c.title}">
                        <div class="contact-info">
                            <span class="dept-label">${c.dept}</span>
                            <span class="contact-name">${c.name}</span>
                            <span class="contact-title">${c.title}</span>
                        </div>
                        <a href="tel:${dial}" class="call-icon">📞</a>
                    </div>`;
            });
            section.appendChild(header);
            section.appendChild(content);
            container.appendChild(section);
        });
    }

    function toggle(el) {
        el.classList.toggle('active');
        const panel = el.nextElementSibling;
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    function filterList() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        document.querySelectorAll('.location-section').forEach(s => {
            let match = false;
            s.querySelectorAll('.contact-row').forEach(r => {
                const hit = r.getAttribute('data-search').toLowerCase().includes(q);
                r.style.display = hit ? 'flex' : 'none';
                if(hit) match = true;
            });
            s.style.display = (q === "" || match) ? 'block' : 'none';
            if(q !== "" && match) {
                s.querySelector('.location-header').classList.add('active');
                s.querySelector('.location-content').style.display = 'block';
            }
        });
    }
    init();
</script>
</body>
</html>
